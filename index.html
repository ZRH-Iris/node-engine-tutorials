<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节点引擎 · 视频教程</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0B0F1A; color: #E2E8F0; line-height: 1.7; }

/* ── Hero ── */
.hero { position: relative; overflow: hidden; padding: 100px 20px 80px; text-align: center; background: linear-gradient(180deg, #0F172A 0%, #0B0F1A 100%); }
.hero::before { content:''; position:absolute; top:-200px; left:50%; transform:translateX(-50%); width:800px; height:800px; background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 65%); }
.hero .badge { display:inline-block; padding:6px 18px; border-radius:20px; background: rgba(99,102,241,0.15); color: #A5B4FC; font-size:13px; font-weight:600; margin-bottom:20px; letter-spacing:.5px; border:1px solid rgba(99,102,241,0.2); }
.hero h1 { font-size:48px; font-weight:900; letter-spacing:-1px; margin-bottom:16px; position:relative; }
.hero h1 .accent { background: linear-gradient(135deg, #818CF8, #6366F1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero .sub { font-size:19px; color: #94A3B8; max-width:560px; margin:0 auto; letter-spacing:.3px; }

/* ── Container ── */
.container { max-width:1200px; margin:0 auto; padding:0 24px 100px; }

/* ── Section ── */
.section { margin-top:64px; }
.section-head { display:flex; align-items:center; gap:14px; margin-bottom:28px; }
.section-head .dot { width:10px; height:10px; border-radius:50%; }
.section-head h2 { font-size:22px; font-weight:800; letter-spacing:-.3px; }
.section-head .count { font-size:13px; color:#64748B; padding:3px 10px; border-radius:12px; background:rgba(255,255,255,0.04); }

/* ── Card Grid ── */
.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap:20px; }

/* ── Card ── */
.card { background: #111827; border-radius:16px; overflow:hidden; cursor:pointer; transition: all .25s; border:1px solid #1E293B; position:relative; }
.card:hover { transform: translateY(-3px); border-color: #6366F1; box-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(99,102,241,0.15); }
.card:hover .card-play { opacity:1; transform:translate(-50%,-50%) scale(1); }
.card-poster { aspect-ratio:16/9; background: #1A1F2E; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.card-poster .gradient { position:absolute; inset:0; opacity:.4; }
.card-poster .num-big { font-size:72px; font-weight:900; opacity:.08; color:#F8FAFC; }
.card-play { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.85); width:56px; height:56px; border-radius:50%; background:rgba(99,102,241,0.9); display:flex; align-items:center; justify-content:center; opacity:.7; transition:all .3s; backdrop-filter:blur(4px); }
.card-play::after { content:''; display:block; width:0; height:0; border-left:14px solid #fff; border-top:9px solid transparent; border-bottom:9px solid transparent; margin-left:3px; }
.card-body { padding:18px 20px 20px; }
.card-meta { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.card-ep { font-size:12px; font-weight:700; padding:3px 10px; border-radius:10px; letter-spacing:.3px; }
.card-dur { font-size:12px; color:#64748B; }
.card-title { font-size:17px; font-weight:700; color:#F1F5F9; margin-bottom:6px; letter-spacing:-.2px; }
.card-desc { font-size:13px; color:#94A3B8; line-height:1.6; }

/* ── Modal ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(2,4,12,0.92); z-index:1000; align-items:center; justify-content:center; padding:20px; }
.overlay.on { display:flex; }
.modal { background:#111827; border-radius:20px; width:100%; max-width:960px; border:1px solid #1E293B; max-height:90vh; overflow-y:auto; }
.modal-head { padding:20px 28px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1E293B; position:sticky; top:0; background:#111827; z-index:2; }
.modal-head h3 { font-size:20px; font-weight:800; }
.modal-close { background:none; border:none; color:#64748B; font-size:26px; cursor:pointer; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; transition:.2s; }
.modal-close:hover { background:#1E293B; color:#F8FAFC; }
.modal-body { padding:28px; }
.modal-video { aspect-ratio:16/9; background:#0B0F1A; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#475569; border:2px dashed #1E293B; margin-bottom:20px; transition:.3s; }
.modal-video:hover { border-color:#6366F1; }
.modal-video .icon { width:56px; height:56px; margin-bottom:16px; opacity:.4; }
.modal-video .txt { font-size:16px; margin-bottom:4px; }
.modal-video .hint { font-size:13px; color:#334155; }
.modal-info { font-size:14px; color:#94A3B8; line-height:1.8; }

/* ── Footer ── */
.footer { text-align:center; padding:48px 20px; color:#475569; font-size:13px; border-top:1px solid #1A1F2E; }

/* ── Colors per series ── */
.c1 .dot { background:#818CF8; } .c1 .card-ep { background:rgba(129,140,248,0.12); color:#A5B4FC; } .c1 .gradient { background:linear-gradient(135deg, #6366F120, #818CF810); }
.c2 .dot { background:#F59E0B; } .c2 .card-ep { background:rgba(245,158,11,0.12); color:#FBBF24; } .c2 .gradient { background:linear-gradient(135deg, #F59E0B20, #D9770610); }
.c3 .dot { background:#F43F5E; } .c3 .card-ep { background:rgba(244,63,94,0.12); color:#FB7185; } .c3 .gradient { background:linear-gradient(135deg, #F43F5E20, #E11D4810); }
.c4 .dot { background:#10B981; } .c4 .card-ep { background:rgba(16,185,129,0.12); color:#34D399; } .c4 .gradient { background:linear-gradient(135deg, #10B98120, #05966910); }
.c5 .dot { background:#8B5CF6; } .c5 .card-ep { background:rgba(139,92,246,0.12); color:#A78BFA; } .c5 .gradient { background:linear-gradient(135deg, #8B5CF620, #7C3AED10); }

@media (max-width:700px) {
  .hero h1 { font-size:30px; } .grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="badge">🎬 视频教程系列</div>
  <h1><span class="accent">节点引擎</span> 从入门到精通</h1>
  <p class="sub">手把手教你打造自己的 AI 超级节点</p>
</div>

<div class="container">

  <div class="section c1">
    <div class="section-head"><div class="dot"></div><h2>认识节点 · 接入节点</h2><div class="count">2 集</div></div>
    <div class="grid" id="g1"></div>
  </div>

  <div class="section c2">
    <div class="section-head"><div class="dot"></div><h2>使用技巧 · 越用越顺手</h2><div class="count">9 集</div></div>
    <div class="grid" id="g2"></div>
  </div>

  <div class="section c3">
    <div class="section-head"><div class="dot"></div><h2>把你的经验变成节点的能力</h2><div class="count">3 集</div></div>
    <div class="grid" id="g3"></div>
  </div>

  <div class="section c4">
    <div class="section-head"><div class="dot"></div><h2>真实场景 · 让节点替你干活</h2><div class="count">2 集</div></div>
    <div class="grid" id="g4"></div>
  </div>

  <div class="section c5">
    <div class="section-head"><div class="dot"></div><h2>持续进化 · 节点和你一起成长</h2><div class="count">1 集</div></div>
    <div class="grid" id="g5"></div>
  </div>

</div>

<div class="footer">节点引擎 —— 帮助先知者打造连接 AI 超级生产力的节点</div>

<div class="overlay" id="ol" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><h3 id="mt"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="modal-video">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
        <div class="txt" id="mv">视频即将上线</div>
        <div class="hint" id="mh">录制完成后自动替换</div>
      </div>
      <div class="modal-info" id="mi"></div>
    </div>
  </div>
</div>

<script>
const eps = [
  { g:1, n:'第1集', t:'AI时代，你在第几层？', d:'世界正在按人与AI超级生产力的距离重新分层。别做围观者——先看清局面，再决定怎么走。', dur:'1分30秒', tag:'认知' },
  { g:1, n:'第2集', t:'2分钟接入你的AI超级节点', d:'注册账号、看一眼后台、连接飞书、发出第一条消息。模型和工具平台全部帮你配好，你只负责接入。', dur:'2分钟', tag:'接入' },

  { g:2, n:'第3集', t:'让节点记住你', d:'告诉节点你是谁、做什么工作、喜欢什么风格。30秒自我介绍，以后每次对话都省时间。', dur:'1分30秒', tag:'基础' },
  { g:2, n:'第4集', t:'这样提问，节点秒懂你', d:'学会给格式、给例子、给约束。同样的问题，问法不同结果天差地别——看完这集你就知道了。', dur:'1分30秒', tag:'基础' },
  { g:2, n:'第5集', t:'省 Token 的 3 个好习惯', d:'别寒暄、一次把话说完、不确定时让节点反问你。三个小习惯，让你用得更聪明。', dur:'1分20秒', tag:'技巧' },
  { g:2, n:'第6集', t:'文件处理的 3 种姿势', d:'拖文件到对话框、复制粘贴长文本、发链接让节点自己读。PDF、Word、图片、录音——全都能处理。', dur:'1分30秒', tag:'技巧' },
  { g:2, n:'第7集', t:'答错了别重来，纠正它', d:'节点答偏了？一句话纠正。理解错了？补充背景就好。不用重新提问，改比写快。', dur:'1分钟', tag:'技巧' },
  { g:2, n:'第8集', t:'用语音跟节点说话', d:'开车、走路、懒得打字——直接发语音，节点自动转文字然后处理。解放双手，效率翻倍。', dur:'1分钟', tag:'技巧' },
  { g:2, n:'第9集', t:'让节点记住你的常用模板', d:'教它一次你的周报格式、方案结构、邮件模板。以后说「写周报」，它直接按你的模板来。', dur:'1分20秒', tag:'进阶' },
  { g:2, n:'第10集', t:'睡前丢任务，醒来收结果', d:'晚上把长任务发给它——整理资料、做分析、写报告。第二天打开飞书，结果已经在等着你了。', dur:'1分20秒', tag:'进阶' },
  { g:2, n:'第11集', t:'让节点替你干活', d:'给它一个完整任务——搜索、整理、分析、输出，全部自动完成。前面学的一切，都是为了这件事。', dur:'1分40秒', tag:'进阶' },

  { g:3, n:'第12集', t:'把人脉变成节点的记忆', d:'把重要联系人的信息告诉节点。下次出差前，让它帮你筛选该见谁、写什么约见文案。', dur:'1分30秒', tag:'蒸馏' },
  { g:3, n:'第13集', t:'把经验变成节点的能力', d:'录音→转文字→提炼→写文章→做PPT——整条链路教它一次，以后说三个字它就能跑完。', dur:'1分40秒', tag:'蒸馏' },
  { g:3, n:'第14集', t:'把项目变成长期的伙伴', d:'项目背景、进度、决策全部记录。过几天回来继续聊，它还记得走到哪了。', dur:'1分30秒', tag:'蒸馏' },

  { g:4, n:'第15集', t:'用节点搞定一天的工作', d:'从早上的待办整理，到中午的会议纪要，到下午的方案撰写，到晚上的复盘总结——全程陪伴。', dur:'1分30秒', tag:'场景' },
  { g:4, n:'第16集', t:'从想法到产品，一条龙', d:'你只需要说「我想做XX」，节点帮你理需求、做设计、写代码、部署上线。你是AI的指挥官。', dur:'2分钟', tag:'场景' },

  { g:5, n:'第17集', t:'一个月后的节点长什么样', d:'第一周它只是聊天工具。一个月后，它记得你的人、你的项目、你的风格——它是你的AI分身。', dur:'1分20秒', tag:'进化' },
];

for (const ep of eps) {
  const g = document.getElementById('g'+ep.g);
  const idx = eps.indexOf(ep);
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => openModal(ep);
  card.innerHTML = `<div class="card-poster">
    <div class="gradient"></div>
    <div class="num-big">${String(idx+1).padStart(2,'0')}</div>
    <div class="card-play"></div>
  </div>
  <div class="card-body">
    <div class="card-meta"><span class="card-ep">${ep.n}</span><span class="card-dur">⏱ ${ep.dur}</span></div>
    <div class="card-title">${ep.t}</div>
    <div class="card-desc">${ep.d}</div>
  </div>`;
  g.appendChild(card);
}

function openModal(ep) {
  document.getElementById('mt').textContent = `${ep.n}  ${ep.t}`;
  document.getElementById('mv').textContent = '视频即将上线';
  document.getElementById('mh').textContent = `⏱ ${ep.dur} · 录制完成后替换`;
  document.getElementById('mi').textContent = ep.d;
  document.getElementById('ol').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('ol').classList.remove('on');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
