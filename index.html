<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节点引擎 · 视频教程</title>
<style>
:root {
  --bg: #05070A;
  --card: #0B0F17;
  --border: #141B28;
  --text: #94A3B8;
  --text-bright: #E2E8F0;
  --accent: #6366F1;
  --accent-glow: #818CF8;
  --accent-soft: rgba(99,102,241,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

/* ── Floating particles ── */
.particles {
  position:fixed; inset:0; pointer-events:none; z-index:0;
}
.particle {
  position:absolute; border-radius:50%;
  background: var(--accent);
  animation: float linear infinite;
  opacity: 0;
}
@keyframes float {
  0%   { transform:translateY(100vh) scale(0); opacity:0; }
  10%  { opacity:0.6; }
  90%  { opacity:0.15; }
  100% { transform:translateY(-10vh) scale(1); opacity:0; }
}

/* ── Background glow orbs ── */
.bg-orb {
  position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0;
}
.bg-orb-1 { width:600px; height:600px; background:rgba(99,102,241,0.06); top:-200px; left:-100px; }
.bg-orb-2 { width:500px; height:500px; background:rgba(129,140,248,0.04); bottom:-150px; right:-100px; }

/* ── Nav ── */
.nav {
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  background:rgba(5,7,10,0.75);
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:0 20px; display:flex; align-items:center;
  justify-content:space-between; height:52px;
}
.nav-logo {
  font-weight:800; font-size:15px; color:#F1F5F9;
  display:flex; align-items:center; gap:7px;
}
.nav-logo .dot {
  width:7px; height:7px; border-radius:50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
  animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%,100% { box-shadow:0 0 8px var(--accent), 0 0 16px var(--accent); }
  50% { box-shadow:0 0 16px var(--accent), 0 0 32px var(--accent-glow); }
}
.nav-actions { display:flex; align-items:center; gap:8px; }
.nav-btn {
  padding:6px 14px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  color: var(--text); font-size:12px; cursor:pointer;
  transition:all .25s; font-family:inherit; white-space:nowrap;
}
.nav-btn:hover {
  border-color:rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.06);
}
.nav-btn.active {
  background: var(--accent-soft);
  border-color:rgba(99,102,241,0.35);
  color: var(--accent-glow);
}
.search-wrap { position:relative; }
.search-wrap input {
  padding:6px 12px 6px 32px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  color:#F1F5F9; font-size:12px; width:160px;
  outline:none; font-family:inherit; transition:all .25s;
}
.search-wrap input:focus {
  border-color:rgba(99,102,241,0.4); width:200px;
  box-shadow:0 0 0 3px rgba(99,102,241,0.08);
}
.search-wrap input::placeholder { color:#334155; }
.search-wrap .sicon {
  position:absolute; left:10px; top:50%;
  transform:translateY(-50%); color:#475569; font-size:12px; pointer-events:none;
}

/* ── Hero ── */
.hero {
  position:relative; z-index:1; padding:80px 20px 56px;
  text-align:center; overflow:hidden;
}
.hero::after {
  content:''; position:absolute; bottom:0; left:10%; right:10%;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(99,102,241,0.25), transparent);
}
.hero-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 14px; border-radius:20px;
  background: var(--accent-soft);
  color: var(--accent-glow); font-size:11px; font-weight:600;
  border:1px solid rgba(99,102,241,0.15);
  margin-bottom:24px;
  animation: badge-in .6s ease-out;
}
@keyframes badge-in {
  0% { opacity:0; transform:translateY(10px); }
  100% { opacity:1; transform:translateY(0); }
}
.hero h1 {
  font-size:clamp(28px, 6vw, 48px);
  font-weight:900; letter-spacing:-1.5px;
  margin-bottom:16px; line-height:1.2;
  animation: title-in .8s ease-out;
}
@keyframes title-in {
  0% { opacity:0; transform:translateY(20px); }
  100% { opacity:1; transform:translateY(0); }
}
.hero h1 .accent {
  background:linear-gradient(135deg, #A5B4FC 0%, #6366F1 50%, #818CF8 100%);
  background-size:200% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation: gradient-shift 4s ease-in-out infinite;
}
@keyframes gradient-shift {
  0%,100% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
}
.hero .sub {
  font-size:clamp(14px, 2vw, 16px);
  color:#475569; max-width:460px; margin:0 auto;
  animation: title-in .8s .1s ease-out both;
}

/* ── Main ── */
.main {
  position:relative; z-index:1;
  max-width:1160px; margin:0 auto; padding:0 20px 80px;
}

/* ── Module ── */
.module { margin-top:48px; }
.module-head {
  display:flex; align-items:center; gap:8px; margin-bottom:6px;
  flex-wrap:wrap;
}
.module-head .icon {
  width:30px; height:30px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; background: var(--accent-soft);
}
.module-head h2 {
  font-size:clamp(17px, 3vw, 20px);
  font-weight:700; color: var(--text-bright);
}
.module-head .cnt {
  font-size:11px; color:#475569; padding:2px 8px;
  border-radius:6px; background:rgba(255,255,255,0.03);
}
.module-desc {
  font-size:13px; color:#64748B; margin-bottom:20px; padding-left:38px;
}

/* ── Grid ── */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:14px;
}

/* ── Card ── */
.card {
  background: var(--card);
  border-radius:14px; overflow:hidden; cursor:pointer;
  border:1px solid var(--border);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.card::before {
  content:''; position:absolute; inset:-1px; border-radius:15px;
  background:linear-gradient(135deg, rgba(99,102,241,0), rgba(99,102,241,0.08));
  opacity:0; transition:opacity .35s;
  z-index:0; pointer-events:none;
}
.card:hover::before { opacity:1; }
.card:hover {
  transform:translateY(-4px);
  border-color:rgba(99,102,241,0.25);
  box-shadow:0 8px 40px rgba(99,102,241,0.08), 0 2px 8px rgba(0,0,0,0.5);
}
.card-thumb {
  aspect-ratio:16/9; background:linear-gradient(135deg, #0D1322, #0F1524);
  position:relative; display:flex; align-items:center;
  justify-content:center; overflow:hidden;
}
.card-thumb .bg-grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
  background-size:24px 24px;
}
.card-thumb .sn {
  font-size:clamp(48px, 8vw, 72px);
  font-weight:900; opacity:.04; color:#F1F5F9;
  font-variant-numeric:tabular-nums;
}
.play-dot {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:46px; height:46px; border-radius:50%;
  background:rgba(99,102,241,0.8);
  display:flex; align-items:center; justify-content:center;
  opacity:.7; transition:all .35s;
  z-index:1;
}
.play-dot::after {
  content:''; display:block; width:0; height:0;
  border-left:11px solid #fff;
  border-top:6px solid transparent;
  border-bottom:6px solid transparent;
  margin-left:2px;
}
.play-dot::before {
  content:''; position:absolute; inset:-6px; border-radius:50%;
  border:2px solid rgba(99,102,241,0.3);
  animation: play-ripple 2s ease-out infinite;
}
@keyframes play-ripple {
  0% { transform:scale(1); opacity:.4; }
  100% { transform:scale(1.6); opacity:0; }
}
.card:hover .play-dot {
  opacity:1; background:rgba(99,102,241,0.95);
  box-shadow:0 0 24px rgba(99,102,241,0.4);
}
.card-info { padding:14px 16px 16px; position:relative; z-index:1; }
.card-top { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.card-num {
  font-size:10px; font-weight:700;
  padding:2px 7px; border-radius:5px;
  background: var(--accent-soft); color: var(--accent-glow);
}
.card-title {
  font-size:clamp(14px, 2vw, 15px);
  font-weight:700; color: #E2E8F0; margin-bottom:4px;
}
.card-desc {
  font-size:12px; color:#64748B; line-height:1.55;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  overflow:hidden;
}

/* ── Outline Panel ── */
.outline-panel {
  display:none; background: var(--card);
  border:1px solid var(--border); border-radius:14px;
  padding:28px 24px; margin-top:48px;
  animation: panel-in .3s ease-out;
}
@keyframes panel-in {
  0% { opacity:0; transform:translateY(-8px); }
  100% { opacity:1; transform:translateY(0); }
}
.outline-panel.on { display:block; }
.outline-panel h2 {
  font-size:18px; font-weight:800; color: var(--text-bright);
  margin-bottom:20px; text-align:center;
}
.outline-row {
  display:flex; align-items:baseline; gap:10px;
  padding:9px 10px; cursor:pointer; border-radius:8px;
  transition:all .15s; border-bottom:1px solid rgba(255,255,255,0.02);
}
.outline-row:hover { background:rgba(99,102,241,0.06); }
.outline-row .onum {
  font-size:11px; font-weight:700; color: var(--accent-glow);
  min-width:44px; text-align:center;
  background: var(--accent-soft); padding:2px 6px; border-radius:5px;
}
.outline-row .obody { flex:1; min-width:0; }
.outline-row .otitle { font-size:13px; color: #E2E8F0; font-weight:600; }
.outline-row .odesc {
  font-size:11px; color:#64748B; margin-top:2px; line-height:1.5;
}

/* ── Coming Soon ── */
.coming {
  margin-top:56px; text-align:center;
  padding:44px 20px; border:1px dashed rgba(99,102,241,0.12);
  border-radius:16px; background:rgba(99,102,241,0.02);
  position:relative; overflow:hidden;
}
.coming::before {
  content:''; position:absolute; top:50%; left:50%;
  width:300px; height:300px;
  background:radial-gradient(circle, rgba(99,102,241,0.03) 0%, transparent 70%);
  transform:translate(-50%,-50%);
  animation: coming-breathe 4s ease-in-out infinite;
}
@keyframes coming-breathe {
  0%,100% { transform:translate(-50%,-50%) scale(1); opacity:.5; }
  50% { transform:translate(-50%,-50%) scale(1.3); opacity:1; }
}
.coming h3 {
  font-size:15px; color:#475569; font-weight:600;
  margin-bottom:8px; position:relative; z-index:1;
}
.coming p {
  font-size:12px; color:#1E293B; position:relative; z-index:1;
}

/* ── Modal ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(2,3,5,0.92); z-index:200;
  align-items:center; justify-content:center;
  padding:16px;
}
.overlay.on { display:flex; }
.modal {
  background: var(--card); border-radius:16px;
  width:100%; max-width:900px;
  border:1px solid var(--border);
  max-height:90vh; overflow-y:auto;
  animation: modal-in .25s ease-out;
}
@keyframes modal-in {
  0% { opacity:0; transform:scale(.97) translateY(10px); }
  100% { opacity:1; transform:scale(1) translateY(0); }
}
.modal-head {
  padding:16px 20px; display:flex;
  justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; background: var(--card); z-index:2;
}
.modal-head h3 {
  font-size:clamp(15px, 2.5vw, 18px);
  font-weight:800; color: var(--text-bright);
}
.modal-close {
  background:none; border:none; color:#475569; font-size:20px;
  cursor:pointer; width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.modal-close:hover { background:rgba(255,255,255,0.05); color:#E2E8F0; }
.modal-body { padding:20px; }
.modal-video {
  aspect-ratio:16/9; background:linear-gradient(135deg, #0A0E17, #0D1322);
  border-radius:12px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border:1px solid var(--border); margin-bottom:14px;
}
.modal-video svg {
  width:40px; height:40px; margin-bottom:10px; opacity:.3;
  color: var(--accent-glow);
}
.modal-video .vt { font-size:14px; color:#475569; }
.modal-video .vh { font-size:11px; color:#1E293B; margin-top:3px; }
.modal-info { font-size:13px; color:#94A3B8; line-height:1.8; }

/* ── Footer ── */
.footer {
  text-align:center; padding:40px 16px;
  color:#1E293B; font-size:11px;
  border-top:1px solid rgba(255,255,255,0.03);
  position:relative; z-index:1;
}
.no-results {
  text-align:center; padding:40px; color:#475569;
  font-size:14px; display:none;
}

/* ── Mobile ── */
@media (max-width:640px) {
  .nav { padding:0 14px; height:48px; }
  .nav-logo { font-size:14px; }
  .nav-btn { padding:5px 10px; font-size:11px; }
  .search-wrap input { width:110px; font-size:11px; }
  .search-wrap input:focus { width:140px; }
  .hero { padding:56px 16px 40px; }
  .hero h1 { font-size:26px; }
  .hero .sub { font-size:13px; }
  .main { padding:0 14px 60px; }
  .grid { grid-template-columns:1fr; gap:12px; }
  .module { margin-top:36px; }
  .module-desc { padding-left:0; font-size:12px; }
  .module-head { flex-wrap:wrap; }
  .card-info { padding:12px 14px 14px; }
  .card-thumb .sn { font-size:48px; }
  .play-dot { width:38px; height:38px; }
  .play-dot::after { border-left:9px solid #fff; border-top:5px solid transparent; border-bottom:5px solid transparent; }
  .outline-panel { padding:20px 14px; }
  .outline-row { flex-direction:column; gap:4px; padding:8px 6px; }
  .outline-row .onum { min-width:auto; display:inline-block; }
  .coming { padding:32px 14px; }
  .modal { border-radius:12px; }
  .modal-body { padding:14px; }
  .modal-head { padding:12px 14px; }
}
</style>
</head>
<body>

<canvas class="particles" id="particles"></canvas>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<nav class="nav">
  <div class="nav-logo"><span class="dot"></span>节点引擎</div>
  <div class="nav-actions">
    <div class="search-wrap">
      <span class="sicon">🔍</span>
      <input type="text" id="search" placeholder="搜索课程…" oninput="doSearch()">
    </div>
    <button class="nav-btn" id="outlineBtn" onclick="toggleOutline()">📋 课程大纲</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-badge">⚡ 视频教程</div>
  <h1><span class="accent">节点引擎</span> 从入门到精通</h1>
  <p class="sub">手把手教你打造自己的 AI 超级节点</p>
</div>

<div class="main">

  <div class="module">
    <div class="module-head">
      <div class="icon">🌟</div>
      <h2>启蒙篇</h2>
      <div class="cnt">8 集</div>
    </div>
    <div class="module-desc">从零开始，覆盖注册接入到独立完成第一个任务的完整路径。每集聚焦一个核心操作，看完就能上手。</div>
    <div class="grid" id="g1"></div>
  </div>

  <div class="coming">
    <h3>更多系列即将上线</h3>
    <p>使用技巧 · 经验蒸馏 · 场景实战 · 持续进化</p>
  </div>

  <div class="no-results" id="nores">没有找到匹配的课程</div>
</div>

<div class="footer">节点引擎 —— 帮助先知者打造连接 AI 超级生产力的节点</div>

<div class="overlay" id="outlineOverlay" onclick="if(event.target===this)closeOutline()">
  <div class="modal" style="max-width:640px">
    <div class="modal-head"><h3>📋 启蒙篇 · 课程大纲</h3><button class="modal-close" onclick="closeOutline()">✕</button></div>
    <div class="modal-body" id="outlineBody"></div>
  </div>
</div>

<div class="overlay" id="ol" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><h3 id="mt"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="modal-video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
        <div class="vt" id="mv">视频即将上线</div>
        <div class="vh" id="mh">录制完成后替换</div>
      </div>
      <div class="modal-info" id="mi"></div>
    </div>
  </div>
</div>

<script>
/* ── Particles ── */
(function(){
  const c=document.getElementById('particles'), ctx=c.getContext('2d');
  let W,H,ps=[];
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<30;i++) ps.push({x:Math.random()*W, y:Math.random()*H, r:1+Math.random()*2, v:0.3+Math.random()*0.7, o:0.15+Math.random()*0.35});
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const p of ps){
      p.y-=p.v; if(p.y<-10){p.y=H+10; p.x=Math.random()*W;}
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(99,102,241,${p.o})`; ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Data ── */
const eps = [
  { n:1, t:'3分钟拥有你的AI节点', content:'不用下载、不用配置，收到一个链接就能注册。3分钟搞定，你的专属AI助手直接出现在飞书里。' },
  { n:2, t:'第一次对话，该说什么', content:'第一次跟AI聊天不知道聊什么？照这个流程来：先让它认识你是谁、做什么的，再给它第一个任务。' },
  { n:3, t:'发语音，说话就能用', content:'不想打字？直接发语音。开车、走路、做家务的时候照样用，说完它就能听懂、帮你处理。' },
  { n:4, t:'把文件给它，让它帮你读', content:'会议录音、PDF合同、产品图片……拖进去、粘贴、或者甩个链接，它都能帮你读明白。' },
  { n:5, t:'让它把做好的东西发给你', content:'让它做的PPT、写的文档、整的表格，直接发到飞书里，点一下就能下载。没自动发？说一声就行。' },
  { n:6, t:'它答错了，改一下就行', content:'回答不满意？不用重新来一遍。告诉它「说人话」「换个风格」或者「再来一版」，它秒改。' },
  { n:7, t:'让节点记住你', content:'跟它说一次你是谁、喜欢什么风格，它就记住了。以后每次干活直接按你的路数来，越用越顺手。' },
  { n:8, t:'让它替你干一件完整的事', content:'搜资料、整理、分析、写出来——你只需要交代一句，它全流程包圆。你只负责验收。' },
];

function buildOutline(){
  let h='';
  for(const ep of eps) h+=`<div class="outline-row" onclick="closeOutline();openModal(${ep.n})"><span class="onum">第${ep.n}集</span><div class="obody"><div class="otitle">${ep.t}</div><div class="odesc">${ep.content}</div></div></div>`;
  document.getElementById('outlineBody').innerHTML=h;
}
buildOutline();

function toggleOutline(){
  document.getElementById('outlineOverlay').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeOutline(){
  document.getElementById('outlineOverlay').classList.remove('on');
  document.body.style.overflow='';
}

function doSearch(){
  const q=document.getElementById('search').value.toLowerCase();
  let any=false;
  for(const ep of eps){
    const card=document.querySelector(`[data-ep="${ep.n}"]`);
    if(!card) continue;
    const match=!q||ep.t.toLowerCase().includes(q)||ep.content.toLowerCase().includes(q);
    card.style.display=match?'':'none';
    if(match) any=true;
  }
  document.getElementById('nores').style.display=any?'none':'block';
}

for(const ep of eps){
  const g=document.getElementById('g1');
  const card=document.createElement('div');
  card.className='card'; card.setAttribute('data-ep',ep.n);
  card.onclick=()=>openModal(ep.n);
  card.innerHTML=`<div class="card-thumb"><div class="bg-grid"></div><div class="sn">${String(ep.n).padStart(2,'0')}</div><div class="play-dot"></div></div><div class="card-info"><div class="card-top"><span class="card-num">第${ep.n}集</span></div><div class="card-title">${ep.t}</div><div class="card-desc">${ep.content}</div></div>`;
  g.appendChild(card);
}

function openModal(n){
  const ep=eps[n-1];
  document.getElementById('mt').textContent=`第${n}集  ${ep.t}`;
  document.getElementById('mv').textContent='视频即将上线';
  document.getElementById('mh').textContent='录制完成后替换';
  document.getElementById('mi').innerHTML=`<p>${ep.content}</p>`;
  document.getElementById('ol').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('ol').classList.remove('on');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeOutline();}});
</script>
</body>
</html>
