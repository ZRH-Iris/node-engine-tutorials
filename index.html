<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节点引擎 · 视频教程</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #06080D; color: #D1D5DB; line-height: 1.7; }

.nav { position:sticky; top:0; z-index:100; background: rgba(6,8,13,0.85); backdrop-filter: blur(16px); border-bottom:1px solid rgba(255,255,255,0.06); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; }
.nav-logo { font-weight:800; font-size:16px; color:#F9FAFB; letter-spacing:-.3px; }
.nav-actions { display:flex; align-items:center; gap:10px; }
.nav-btn { padding:7px 16px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:#D1D5DB; font-size:13px; cursor:pointer; transition:.2s; font-family:inherit; white-space:nowrap; }
.nav-btn:hover { border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); }
.nav-btn.active { background:rgba(99,102,241,0.15); border-color:rgba(99,102,241,0.3); color:#A5B4FC; }
.search-wrap { position:relative; }
.search-wrap input { padding:7px 14px 7px 34px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:#F9FAFB; font-size:13px; width:200px; outline:none; font-family:inherit; transition:.2s; }
.search-wrap input:focus { border-color:rgba(99,102,241,0.4); width:260px; }
.search-wrap input::placeholder { color:#4B5563; }
.search-wrap .sicon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:#4B5563; font-size:13px; pointer-events:none; }

.hero { padding:80px 20px 60px; text-align:center; position:relative; overflow:hidden; }
.hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, rgba(99,102,241,0.2), transparent); }
.hero .badge { display:inline-block; padding:5px 16px; border-radius:20px; background:rgba(99,102,241,0.1); color:#A5B4FC; font-size:12px; font-weight:600; margin-bottom:20px; border:1px solid rgba(99,102,241,0.15); }
.hero h1 { font-size:44px; font-weight:900; letter-spacing:-1px; margin-bottom:12px; }
.hero h1 .accent { background:linear-gradient(135deg, #A5B4FC, #6366F1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero .sub { font-size:17px; color:#6B7280; max-width:500px; margin:0 auto; }

.main { max-width:1200px; margin:0 auto; padding:0 24px 100px; }

/* ── Module ── */
.module { margin-top:56px; }
.module-head { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.module-head .icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; background:rgba(129,140,248,0.12); color:#A5B4FC; }
.module-head h2 { font-size:19px; font-weight:700; color:#F3F4F6; letter-spacing:-.2px; }
.module-head .cnt { font-size:12px; color:#4B5563; padding:2px 8px; border-radius:8px; background:rgba(255,255,255,0.04); }
.module-desc { font-size:13px; color:#6B7280; margin-bottom:24px; padding-left:44px; }

.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap:16px; }

.card { background:#0D1117; border-radius:14px; overflow:hidden; cursor:pointer; transition:all .25s; border:1px solid #161B22; }
.card:hover { transform:translateY(-2px); border-color:#30363D; box-shadow:0 8px 30px rgba(0,0,0,0.4); }
.card:hover .play-dot { opacity:1; transform:translate(-50%,-50%) scale(1); }
.card-thumb { aspect-ratio:16/9; background:#0F1419; position:relative; display:flex; align-items:center; justify-content:center; }
.card-thumb .bg { position:absolute; inset:0; opacity:.3; background:linear-gradient(135deg, rgba(99,102,241,0.12), rgba(129,140,248,0.04)); }
.card-thumb .sn { font-size:64px; font-weight:900; opacity:.06; color:#F9FAFB; }
.play-dot { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.85); width:50px; height:50px; border-radius:50%; background:rgba(99,102,241,0.85); display:flex; align-items:center; justify-content:center; opacity:.65; transition:all .3s; }
.play-dot::after { content:''; display:block; width:0; height:0; border-left:12px solid #fff; border-top:7px solid transparent; border-bottom:7px solid transparent; margin-left:2px; }
.card-info { padding:16px 18px 18px; }
.card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.card-num { font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; background:rgba(129,140,248,0.12); color:#A5B4FC; }
.card-title { font-size:16px; font-weight:700; color:#E6EDF3; margin-bottom:4px; }
.card-desc { font-size:12.5px; color:#8B949E; line-height:1.55; margin-bottom:2px; }
.card-why { font-size:11.5px; color:#6366F1; }

/* ── Outline Panel ── */
.outline-panel { display:none; background:#0D1117; border:1px solid #161B22; border-radius:16px; padding:32px; margin-top:56px; }
.outline-panel.on { display:block; }
.outline-panel h2 { font-size:20px; font-weight:800; color:#F3F4F6; margin-bottom:24px; text-align:center; }
.outline-row { display:flex; align-items:baseline; gap:12px; padding:8px 12px; cursor:pointer; border-radius:8px; transition:.15s; border-bottom:1px solid #0D1117; }
.outline-row:hover { background:rgba(255,255,255,0.03); }
.outline-row .onum { font-size:12px; font-weight:700; color:#A5B4FC; min-width:50px; background:rgba(129,140,248,0.1); padding:2px 8px; border-radius:6px; text-align:center; }
.outline-row .obody { flex:1; }
.outline-row .otitle { font-size:13px; color:#E6EDF3; font-weight:600; }
.outline-row .odesc { font-size:11.5px; color:#6B7280; margin-top:2px; line-height:1.5; }

/* ── Coming Soon ── */
.coming { margin-top:64px; text-align:center; padding:48px 24px; border:1px dashed #161B22; border-radius:16px; }
.coming h3 { font-size:17px; color:#484F58; font-weight:600; margin-bottom:8px; }
.coming p { font-size:13px; color:#30363D; }

/* ── Modal ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; align-items:center; justify-content:center; padding:20px; }
.overlay.on { display:flex; }
.modal { background:#0D1117; border-radius:20px; width:100%; max-width:960px; border:1px solid #21262D; max-height:90vh; overflow-y:auto; }
.modal-head { padding:18px 24px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #21262D; position:sticky; top:0; background:#0D1117; z-index:2; }
.modal-head h3 { font-size:19px; font-weight:800; color:#F3F4F6; }
.modal-close { background:none; border:none; color:#484F58; font-size:22px; cursor:pointer; width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; }
.modal-close:hover { background:#161B22; color:#E6EDF3; }
.modal-body { padding:24px; }
.modal-video { aspect-ratio:16/9; background:#06080D; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#30363D; border:2px dashed #161B22; margin-bottom:16px; }
.modal-video svg { width:48px; height:48px; margin-bottom:12px; opacity:.35; }
.modal-video .vt { font-size:15px; color:#484F58; }
.modal-video .vh { font-size:12px; color:#21262D; margin-top:4px; }
.modal-info { font-size:14px; color:#8B949E; line-height:1.8; }

.footer { text-align:center; padding:48px 20px; color:#30363D; font-size:12px; border-top:1px solid #0D1117; }
.no-results { text-align:center; padding:40px; color:#484F58; font-size:14px; display:none; }

@media (max-width:700px) {
  .hero h1 { font-size:28px; } .grid { grid-template-columns:1fr; }
  .nav-actions { gap:6px; } .nav-btn { font-size:12px; padding:6px 12px; }
  .search-wrap input { width:130px; } .search-wrap input:focus { width:160px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">⚡ 节点引擎</div>
  <div class="nav-actions">
    <div class="search-wrap">
      <span class="sicon">🔍</span>
      <input type="text" id="search" placeholder="搜索课程…" oninput="doSearch()">
    </div>
    <button class="nav-btn" id="outlineBtn" onclick="toggleOutline()">📋 课程大纲</button>
  </div>
</nav>

<div class="hero">
  <div class="badge">视频教程</div>
  <h1><span class="accent">节点引擎</span> 从入门到精通</h1>
  <p class="sub">手把手教你打造自己的 AI 超级节点</p>
</div>

<div class="main">

  <div class="outline-panel" id="outline"></div>

  <!-- ═══ 入门篇 ═══ -->
  <div class="module">
    <div class="module-head">
      <div class="icon">🚀</div>
      <h2>入门篇</h2>
      <div class="cnt">8 集</div>
    </div>
    <div class="module-desc">从零开始，覆盖注册接入到独立完成第一个任务的完整路径。每集聚焦一个核心操作，看完就能上手。</div>
    <div class="grid" id="g1"></div>
  </div>

  <!-- ═══ 更多内容 ═══ -->
  <div class="coming">
    <h3>更多系列即将上线</h3>
    <p>使用技巧 · 经验蒸馏 · 场景实战 · 持续进化</p>
  </div>

  <div class="no-results" id="nores">没有找到匹配的课程</div>
</div>

<div class="footer">节点引擎 —— 帮助先知者打造连接 AI 超级生产力的节点</div>

<div class="overlay" id="ol" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><h3 id="mt"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="modal-video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
        <div class="vt" id="mv">视频即将上线</div>
        <div class="vh" id="mh">录制完成后替换</div>
      </div>
      <div class="modal-info" id="mi"></div>
    </div>
  </div>
</div>

<script>
const eps = [
  { n:1, t:'3分钟拥有你的AI节点', content:'用户通过手机号注册节点引擎账号，进入后台了解基础界面，完成飞书连接，并发出第一条消息。', why:'解决新用户「从哪里开始」的问题，是整个教程的入口。' },
  { n:2, t:'第一次对话，该说什么', content:'演示完整的首次对话流程：先让节点了解用户的身份和偏好，再给它第一个具体任务，帮助用户迈出第一步。', why:'消除新用户「不知道聊什么」的心理门槛。' },
  { n:3, t:'发语音，说话就能用', content:'用户可以在飞书中直接发送语音消息，节点自动将语音转为文字后处理。适合开车、走路、不方便打字的场景。', why:'降低使用门槛，让用户在任何场景下都能使用节点。' },
  { n:4, t:'把文件给它，让它帮你读', content:'用户可以通过三种方式向节点发送文件：直接拖拽、复制粘贴文本、发送网页链接。节点支持PDF、Word、图片、录音等多种格式。', why:'展示节点的文件处理能力，让用户知道所有材料都可以交给节点消化。' },
  { n:5, t:'让它把做好的东西发给你', content:'节点完成文档、PPT、表格等内容后，可直接将文件发送到飞书对话框供用户下载。如果未自动发送，用户只需一句话即可让它重新导出。', why:'解决「东西做好了怎么拿」的实际问题。' },
  { n:6, t:'它答错了，改一下就行', content:'节点回答不理想时，用户无需重新提问。一句纠正即可调整方向——「太学术了，用大白话重写」或「不对，我要的是给小学生用的」。', why:'教会用户高效纠偏，避免因一次不理想的回答而放弃使用。' },
  { n:7, t:'让节点记住你', content:'节点具备持久记忆能力。用户首次介绍身份和偏好后，后续对话中节点会自动调用这些信息，无需重复说明。', why:'展示节点的长期价值——用得越久，越懂用户。' },
  { n:8, t:'让它替你干一件完整的事', content:'用户给节点一个完整任务——搜索、整理、分析、输出——节点自主完成全流程。通过真实案例对比自己动手与节点代劳的效率差距。', why:'入门系列的收尾，让用户直观感受节点的生产力价值。' },
];

function buildOutline() {
  let h = '<h2>📋 入门篇 · 课程大纲</h2>';
  for (const ep of eps) {
    h += `<div class="outline-row" onclick="openModal(${ep.n})">
      <span class="onum">第${ep.n}集</span>
      <div class="obody"><div class="otitle">${ep.t}</div><div class="odesc">${ep.content}</div></div>
    </div>`;
  }
  document.getElementById('outline').innerHTML = h;
}
buildOutline();

function toggleOutline() {
  const p = document.getElementById('outline');
  const b = document.getElementById('outlineBtn');
  p.classList.toggle('on');
  b.classList.toggle('active');
  if (p.classList.contains('on')) p.scrollIntoView({ behavior:'smooth' });
}

function doSearch() {
  const q = document.getElementById('search').value.toLowerCase();
  let any = false;
  for (const ep of eps) {
    const card = document.querySelector(`[data-ep="${ep.n}"]`);
    if (!card) continue;
    const match = !q || ep.t.toLowerCase().includes(q) || ep.content.toLowerCase().includes(q);
    card.style.display = match ? '' : 'none';
    if (match) any = true;
  }
  document.getElementById('nores').style.display = any ? 'none' : 'block';
}

// Render cards
for (const ep of eps) {
  const g = document.getElementById('g1');
  const card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('data-ep', ep.n);
  card.onclick = () => openModal(ep.n);
  card.innerHTML = `<div class="card-thumb">
    <div class="bg"></div><div class="sn">${String(ep.n).padStart(2,'0')}</div><div class="play-dot"></div>
  </div>
  <div class="card-info">
    <div class="card-top"><span class="card-num">第${ep.n}集</span></div>
    <div class="card-title">${ep.t}</div>
    <div class="card-desc">${ep.content}</div>
    <div class="card-why">${ep.why}</div>
  </div>`;
  g.appendChild(card);
}

function openModal(n) {
  const ep = eps[n-1];
  document.getElementById('mt').textContent = `第${n}集  ${ep.t}`;
  document.getElementById('mv').textContent = '视频即将上线';
  document.getElementById('mh').textContent = '录制完成后替换';
  document.getElementById('mi').innerHTML = `<p style="margin-bottom:12px">${ep.content}</p><p style="color:#6366F1">${ep.why}</p>`;
  document.getElementById('ol').classList.add('on');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('ol').classList.remove('on');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
